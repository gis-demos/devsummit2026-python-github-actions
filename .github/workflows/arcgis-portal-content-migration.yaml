name: Automate PR Change - Publish Content Migration Export Group Content Files

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - PROD/migrations/*.epk
      - migratecontent.py

jobs:
  migrate-content:
    runs-on: ubuntu-latest
    env:
      ARCGIS_PORTAL_URL: ${{ secrets.ARCGIS_PORTAL_URL }}
      ARCGIS_PORTAL_USERNAME: ${{ secrets.ARCGIS_PORTAL_USERNAME }}
      ARCGIS_PORTAL_PASSWORD: ${{ secrets.ARCGIS_PORTAL_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
            activate-environment: true
      - name: Migrate Content
        run: |
          python migratecontent.py
