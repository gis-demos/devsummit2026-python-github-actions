name: Set ArcGIS Portal Organization Security Settings

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - rwmajor2/updates
    paths:
      - PROD/configurations/enterprise_prod_security_settings.json

jobs:
  update-security-settings:
    runs-on: ubuntu-latest
    env:
      ARCGIS_PORTAL_URL: ${{ secrets.ARCGIS_PORTAL_URL }}
      ARCGIS_PORTAL_USERNAME: ${{ secrets.ARCGIS_PORTAL_USERNAME }}
      ARCGIS_PORTAL_PASSWORD: ${{ secrets.ARCGIS_PORTAL_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
            activate-environment: true
      - name: Update Ogranization Security Settings
        run: |
          python organizationsettings.py
